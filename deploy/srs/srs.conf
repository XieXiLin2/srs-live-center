# -----------------------------------------------------------------------------
# SRS 6 origin config for SRS Live Center.
#
# Key points:
#   * http_hooks → http://app:8000/api/hooks/*  (auth + statistics)
#   * HTTP API on :1985, HTTP server on :8080
#   * WebRTC enabled (UDP :8000)
#   * SRT enabled (UDP :10080)
# -----------------------------------------------------------------------------

listen              1935;
max_connections     2000;
daemon              off;
srs_log_tank        console;

# ---------------------------------------------------------------------------
# Liveness / keepalive strategy
# ---------------------------------------------------------------------------
# The goal is to evict half-dead clients (laptop closed, network yanked,
# mobile tunnel collapsed, etc.) within ~1 minute so they stop showing up
# on the admin "SRS clients" page and the backend can close the matching
# session rows. We use three layers in combination:
#
#   1. Kernel TCP keepalive — configured on the **container** in
#      docker-compose via `sysctls`, not in srs.conf (SRS itself enables
#      SO_KEEPALIVE on its listen sockets). See docker-compose.yml.
#
#   2. Application-level publish timeouts — SRS will forcibly close a
#      publisher that stalls (see `publish {}` inside the vhost below).
#
#   3. WebRTC STUN keepalive — handled internally by SRS (the browser sends
#      STUN bindings every few seconds; SRS evicts the session when they
#      stop). No knob is exposed in SRS 6 config for this.
#
# Finally the backend adds its own WS-level 40s heartbeat sweeper in
# stats_reconciler.py so that even if everything above fails the viewer
# analytics stay accurate.
# ---------------------------------------------------------------------------



http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
    raw_api {
        enabled             on;
        allow_reload        on;
        allow_query         on;
        allow_update        on;
    }
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

stats {
    network         0;
    disk            sda;
}

rtc_server {
    enabled         on;
    listen          8000;  # UDP
    # The candidate must be set to a reachable IP/host.
    # Docker compose passes $CANDIDATE from env; we reference it here.
    candidate       $CANDIDATE;

    # NOTE: SRS 6 removed the old `stun_timeout` / `stun_strict_check`
    # knobs from `rtc_server` (config validator rejects them as illegal
    # with `check normal : illegal rtc_server.stun_timeout`). STUN
    # keepalive eviction still works — it is just handled internally and
    # is no longer tunable from srs.conf.
}


srt_server {
    enabled         on;
    listen          10080;
    maxbw           1000000000;
    connect_timeout 4000;
    peerlatency     0;
    recvlatency     120;
}

vhost __defaultVhost__ {
    # --------------- core / low-latency options ---------------
    # Tight GOP cap keeps the startup burst small without completely losing
    # fast-start: new players still get a partial GOP and can decode quickly.
    # For "~1s HTTP-FLV" pipelines, set gop_cache off and require encoders
    # to push GOP=1s with no B-frames; see docs and the admin "低延迟" tab.
    gop_cache_max_frames 250;

    tcp_nodelay     on;
    min_latency     on;
    # `mw_latency` is the merge-write wait budget (ms). Lower = snappier
    # packet fanout at the cost of slightly more syscalls per second.
    mw_latency      100;

    publish {
        mr          off;
        # Parse SPS at publish time — needed by WebRTC play when an RTMP
        # encoder is the source (rtmp_to_rtc below); also helps FLV muxing
        # emit correct codec metadata immediately instead of after the
        # first keyframe.
        parse_sps   on;
        # How long SRS waits for the FIRST publish packet before giving up.
        # A publisher that opens the TCP connection and then stalls (phone
        # lost signal right after the RTMP handshake) gets booted in 10s
        # instead of sitting in the clients list forever.
        #
        # NOTE: In SRS 6 these directives were renamed. The old names
        # `publish_1st_pkt_timeout` / `publish_normal_timeout` now fail
        # config validation with `illegal vhost.publish.publish_1st_pkt_timeout`.
        firstpkt_timeout 10000;
        # Max gap between publish packets; if the publisher stops sending
        # media for this many ms, SRS will kill the session. 5s is a good
        # balance between tolerating jitter and reclaiming zombie slots.
        normal_timeout   5000;
    }

    play {
        # gop_cache on = faster first-frame, ~0.5-2s extra latency.
        # For sub-second FLV latency flip this to `off` (and rely on the
        # encoder pushing GOP=1s), then set `queue_length 10` so SRS does
        # not buffer a second-plus on the play side.
        gop_cache   on;
        queue_length 10;
        mw_latency  100;
        mix_correct on;
        atc         off;
        # NOTE: For idle-player eviction we rely on kernel TCP keepalive
        # (see docker-compose.yml: net.ipv4.tcp_keepalive_*). SRS does not
        # offer a dedicated "idle player" timeout on the play side — half-
        # open HTTP-FLV / RTMP pulls are detected by keepalive probes
        # returning RST, at which point SRS fires on_stop as usual.
    }



    # --------------- http-flv ---------------
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # --------------- webrtc ---------------
    rtc {
        enabled     on;
        bframe      discard;
        rtmp_to_rtc on;   # allow RTMP push to be watched via WebRTC
        rtc_to_rtmp on;   # allow WebRTC push to be watched via RTMP/FLV
    }

    # --------------- http hooks ---------------
    # The app service (FastAPI) handles all auth + statistics.
    # Add ?hook_secret=<shared secret> to the URLs if you configure one
    # in the backend via SRS_HOOK_SECRET.
    http_hooks {
        enabled         on;
        on_connect      http://app:8000/api/hooks/on_connect;
        on_close        http://app:8000/api/hooks/on_close;
        on_publish      http://app:8000/api/hooks/on_publish;
        on_unpublish    http://app:8000/api/hooks/on_unpublish;
        on_play         http://app:8000/api/hooks/on_play;
        on_stop         http://app:8000/api/hooks/on_stop;
    }

    # --------------- srt ---------------
    srt {
        enabled     on;
        srt_to_rtmp on;
    }
}
