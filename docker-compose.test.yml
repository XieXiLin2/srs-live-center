# ============================================================
# Docker Compose — 测试环境 (含 Mock OAuth2)
#
# 使用方式:
#   docker compose -f docker-compose.test.yml up -d --build
#
# 包含服务:
#   - app        (SRS Live Center)  → http://localhost:3000
#   - mock-oauth (Mock OAuth2 服务) → http://localhost:9000
#   - srs        (SRS 6 流媒体)     → rtmp://localhost:1935
#   - redis
# ============================================================

services:
  mock-oauth:
    build: ./mock-oauth
    container_name: srs-live-center-mock-oauth
    restart: unless-stopped
    ports:
      - "9000:9000"

  app:
    build: .
    container_name: srs-live-center-test
    restart: unless-stopped
    ports:
      - "3000:8000"
    volumes:
      - app-data:/app/data
    environment:
      # App
      - APP_NAME=SRS Live Center (Test)
      - APP_SECRET_KEY=test-secret-key-not-for-production
      - DEBUG=true
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173

      # Database
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db

      # Redis
      - REDIS_URL=redis://redis:6379/0

      # OAuth2 — 指向 Mock OAuth2 服务
      - OAUTH2_CLIENT_ID=test-client
      - OAUTH2_CLIENT_SECRET=test-secret
      - OAUTH2_AUTHORIZE_URL=http://localhost:9000/authorize
      - OAUTH2_TOKEN_URL=http://mock-oauth:9000/token
      - OAUTH2_USERINFO_URL=http://mock-oauth:9000/userinfo
      - OAUTH2_LOGOUT_URL=http://localhost:9000/end-session
      - OAUTH2_REDIRECT_URI=http://localhost:3000/auth/callback
      - OAUTH2_SCOPE=openid profile email
      - OAUTH2_ADMIN_GROUP=srs-admin

      # SRS 6 (direct integration, no Oryx)
      - SRS_HTTP_URL=http://srs:8080
      - SRS_API_URL=http://srs:1985
      - SRS_APP=live
      - SRS_HOOK_SECRET=test-hook-secret
      - WEBRTC_PLAY_ENABLED=true

      # JWT
      - JWT_SECRET=test-jwt-secret-not-for-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
    depends_on:
      - redis
      - srs
      - mock-oauth

  srs:
    image: ossrs/srs:6
    container_name: srs-live-center-test-srs
    restart: unless-stopped
    command: ["./objs/srs", "-c", "conf/srs.conf"]
    ports:
      - "1935:1935"        # RTMP push
      - "1985:1985"        # SRS HTTP API（测试方便，公网不要这样开）
      - "8080:8080"        # HTTP-FLV / HLS
      - "8000:8000/udp"    # WebRTC UDP
      - "10080:10080/udp"  # SRT UDP
    volumes:
      - ./deploy/srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - srs-data:/usr/local/srs/objs/nginx/html
    environment:
      - CANDIDATE=${CANDIDATE:-127.0.0.1}

  redis:
    image: redis:7-alpine
    container_name: srs-live-center-test-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  app-data:
  redis-data:
  srs-data:
