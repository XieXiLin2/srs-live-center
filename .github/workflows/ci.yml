name: CI/CD

# ------------------------------------------------------------------
# Action pin policy (2026-04):
#
# GitHub is deprecating Node 20 actions:
#   https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# Every action below is pinned to the latest major that runs on Node 24.
# For first-party actions (checkout / setup-node / setup-python / upload-
# artifact) the move is straightforward. The `docker/*` suite currently
# still ships Node 20 for `setup-buildx-action`, `login-action` and
# `metadata-action`; their newest majors are v3 / v3 / v5 respectively.
# GitHub emits a deprecation warning for them but they still run — we'll
# bump them once Docker publishes Node 24 builds. ``build-push-action``
# already has a Node 24 release as of v6, so we use that.
# ------------------------------------------------------------------

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Frontend Build & Lint
  # ============================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ============================================================
  # Backend install-check (no lint — project chooses not to enforce)
  # ============================================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Import smoke test
        working-directory: backend
        run: uv run python -c "import app.main; print('backend OK')"

  # ============================================================
  # Docker Build & Push
  # ============================================================
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # NOTE: docker/setup-buildx-action's newest major (v3) still runs on
      # Node 20; revisit once Docker publishes a Node 24 release.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # NOTE: docker/login-action's newest major (v3) still runs on Node 20.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: docker/metadata-action's newest major (v5) still runs on Node 20.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Push `latest` for every push to the default branch, as well as
          # for every semver tag release. Also keep branch / sha / semver tags.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Bumped to v6 (Node 24 compatible).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
